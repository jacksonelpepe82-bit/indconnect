    <!-- =====================================================
         CSS — ESTILOS COMPLETOS
    ===================================================== -->
    <style>
        :root {
            --primary-color: #0a1128;
            --secondary-color: #1282a2;
            --accent-color: #ffc857;
            --focus-color: #ff3d9a;
            --text-color: #f0f0f0;
            --background-color: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.98);
            --category-bg: rgba(255, 200, 87, 0.08);
            --category-selected: #ff4081;
            --header-height: 80px; /* FIX: P4 */
            --live-color: #ff4444;
            --control-bg: rgba(10, 10, 10, 0.92);
            --flow-bg: #0d0d0d;
            --flow-header: rgba(8, 8, 12, 0.97);
            --flow-border: rgba(255,255,255,0.07);
            --flow-accent: #ffffff;
            --flow-muted: rgba(255,255,255,0.45);
            --ui-red: #ff0000;
            /* Virtual Scroller */
            --vs-item-height: 160px;
            --vs-item-width: 140px;
            --vs-gap: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: var(--background-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 16px;
        }

        /* === HEADER === */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            background: var(--flow-header);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 100;
            border-bottom: 1px solid var(--flow-border);
        }

        #logo-section { display: flex; align-items: center; gap: 0; }

        #logo {
            height: 50px; /* FIX: P4 — Logo más grande */
            border-radius: 5px;
            object-fit: contain;
        }

        #app-name {
            font-size: 14px;
            font-weight: 500;
            color: #40E0D0;
            letter-spacing: 0.3px;
        }

        #header-info { display: flex; align-items: center; gap: 22px; }

        #datetime.reloj-pantalla {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 300;
            letter-spacing: 0.4px;
        }

        #hora-actual { /* FIX: P4 — font-size 22px */
            font-size: 20px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .reloj-pantalla .separador {
            color: rgba(255,255,255,0.25);
            font-weight: 100;
            font-size: 18px;
        }

        #fecha-actual {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.3px;
        }

        #profile-icon {
            width: 40px; height: 40px;
            min-width: 40px; min-height: 40px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #profile-icon img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        /* === CONTENIDO PRINCIPAL === */
        #main-content {
            height: calc(100vh - var(--header-height));
            margin-top: var(--header-height);
            overflow-y: auto;
            padding: 16px 14px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: var(--background-color);
            /* GPU Acceleration */
            transform: translateZ(0);
            will-change: scroll-position;
        }

        #main-content::-webkit-scrollbar { display: none; }

        .category-section { margin-bottom: 32px; }

        .category-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 14px;
            padding: 5px 14px;
            background: var(--category-bg);
            border-radius: 5px;
            display: inline-block;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.82);
            transition: background 0.2s cubic-bezier(0.4,0,0.2,1),
                        color 0.2s cubic-bezier(0.4,0,0.2,1),
                        transform 0.18s cubic-bezier(0.4,0,0.2,1);
        }

        .category-title.selected {
            background: var(--category-selected);
            color: white;
            transform: translateX(4px);
        }

        /* === VIRTUAL SCROLLER — CONTENEDOR DE FILA === */
        .channels-row-wrapper {
            position: relative;
            overflow: hidden;
            padding: 8px 6px;
        }

        /* El viewport de desplazamiento horizontal */
        .vs-viewport {
            overflow: visible;
            position: relative;
            /* Altura fija para el VS */
            height: var(--vs-item-height);
            padding: 8px 6px;
        }

        /* Track interior que se desplaza con transform */
        .vs-track {
            position: absolute;
            top: 0; left: 0;
            display: flex;
            gap: var(--vs-gap);
            /* GPU Acceleration OBLIGATORIA */
            will-change: transform;
            transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
        }

        /* === CANAL CARD === */
        .channel-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.06);
            cursor: pointer;
            outline: none !important;
            min-width: 140px;
            max-width: 140px;
            width: 140px;
            height: 140px;
            position: relative;
            overflow: visible;
            /* GPU compositing */
            transform: translate3d(0,0,0);
            transition: transform 0.18s cubic-bezier(0.34,1.26,0.64,1),
                        border-color 0.15s ease,
                        background 0.15s ease;
            flex-shrink: 0;
        }

        .channel-card.focused {
            transform: scale(1.06) translate3d(0,0,0);
            border-color: var(--focus-color);
            background: rgba(255,61,154,0.10);
            z-index: 10;
        }

        .channel-logo {
            width: 68px; height: 68px;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 7px;
            background-color: rgba(0,0,0,0.3);
            transition: transform 0.18s cubic-bezier(0.34,1.26,0.64,1);
            transform: translate3d(0,0,0);
        }

        .channel-card.focused .channel-logo {
            transform: scale(1.10) translate3d(0,0,0);
        }

        .channel-info { text-align: center; width: 100%; }

        .channel-name {
            font-size: 12.5px;
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .channel-number {
            font-size: 10px;
            opacity: 0.65;
            letter-spacing: 0.5px;
        }

        /* === MODO TOLERANCIA BADGE === */
        #tolerance-badge {
            position: fixed;
            top: 80px;
            right: 15px;
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,200,87,0.4);
            color: var(--accent-color);
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 1200;
            display: none;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #tolerance-badge.visible {
            display: block;
            opacity: 1;
        }

        /* === PLAYER OVERLAY === */
        #player-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.22s ease;
        }

        #player-overlay.active {
            display: flex;
            opacity: 1;
        }

        #player-container {
            width: 100%; height: 100%;
            position: relative;
            overflow: hidden;
            background: #000000;
        }

        #video-curtain {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000000;
            z-index: 5;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.08s ease;
        }

        #video-curtain.transparent { opacity: 0; }

        #video-player {
            width: 100%; height: 100%;
            display: block;
            background: #000000;
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            position: relative;
            z-index: 1;
        }

        /* Subtítulos limpios */
        ::cue {
            background: transparent !important;
            background-color: transparent !important;
            color: #ffffff !important;
            font-family: 'Roboto', sans-serif !important;
            font-size: 1.1em !important;
            font-weight: 400 !important;
            text-shadow: 0 1px 4px rgba(0,0,0,0.92) !important;
        }
        ::cue-region {
            background: transparent !important;
            background-color: transparent !important;
        }

        .shaka-text-wrapper, .shaka-text-container,
        .shaka-text-container span, .shaka-text-container p {
            background: transparent !important;
            background-color: transparent !important;
            color: #ffffff !important;
            font-family: 'Roboto', sans-serif !important;
            font-size: 1.05em !important;
            font-weight: 400 !important;
            text-shadow: 0 1px 4px rgba(0,0,0,0.92) !important;
        }

        /* === LOADER === */
        .loader-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loader-container.active {
            display: block;
            opacity: 1;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* =====================================================
           PLAYER CONTROLS — TRANSPARENTE Y ROJO
        ===================================================== */
        .player-controls {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 1;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .player-controls.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .tnt-center-controls {
            display: flex;
            align-items: center;
            gap: 45px;
        }

        .control-btn-tnt {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            width: 65px; height: 65px;
            border-radius: 50%;
            outline: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            opacity: 0.5;
        }

        .control-btn-tnt:active { transform: scale(0.95); }

        .control-btn-tnt.focused {
            opacity: 1;
            transform: scale(1.15);
            filter: brightness(1.6);
        }

        .tnt-right-sidebar {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .tnt-side-icon { color: white; font-size: 24px; opacity: 0.7; }

        .tnt-bottom-bar {
            position: absolute;
            bottom: 40px;
            left: 0; right: 0;
            background: transparent;
        }

        .tnt-timeline {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 40px;
            margin-bottom: 20px;
        }

        .tnt-progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        .tnt-progress-fill {
            width: 100%; height: 100%;
            background: var(--ui-red);
            border-radius: 3px;
        }

        .tnt-live-badge {
            background: var(--ui-red);
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .tnt-ticker {
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: transparent;
        }

        .tnt-brand-box {
            display: flex;
            align-items: center;
            background: transparent;
        }

        .tnt-ticker-logo {
            height: 45px;
            max-width: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .tnt-ticker-name {
            color: white;
            font-weight: 900;
            font-size: 22px;
            margin-left: 15px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* === MINI EPG === */
        #miniEPG {
            position: fixed;
            bottom: 90px;
            left: 20px; right: 20px;
            background: rgba(0,0,0,0.88);
            border: 1px solid rgba(255,200,87,0.3);
            border-radius: 16px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1300;
            opacity: 0;
            transform: translate3d(0,15px,0);
            transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.34,1.26,0.64,1);
            pointer-events: none;
        }

        #miniEPG.visible {
            opacity: 1;
            transform: translate3d(0,0,0);
            pointer-events: auto;
        }

        .brand-tag {
            position: absolute;
            top: -25px; right: 30px;
            background: var(--accent-color);
            color: black;
            padding: 4px 15px;
            font-weight: 900;
            font-size: 14px;
            border-radius: 4px 4px 0 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 10;
        }

        .miniEPG-logo {
            width: 68px; height: 68px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 4px;
        }

        .miniEPG-info { flex: 1; }

        .miniEPG-header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .miniEPG-name { font-size: 20px; font-weight: 600; color: white; letter-spacing: 0.3px; }

        .miniEPG-number {
            font-size: 14px;
            color: var(--accent-color);
            background: rgba(255,200,87,0.18);
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
        }

        .miniEPG-now {
            font-size: 15px;
            color: rgba(255,255,255,0.95);
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .miniEPG-now i { color: var(--live-color); font-size: 10px; }

        .miniEPG-next {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .miniEPG-next i { color: rgba(255,255,255,0.5); font-size: 10px; }

        /* === LIVE EDGE BADGE === */
        #live-edge-badge {
            position: fixed;
            top: 85px; left: 15px;
            background: rgba(255,68,68,0.9);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 1200;
            display: none;
            letter-spacing: 0.5px;
        }

        #live-edge-badge.visible { display: block; }

        /* === ZAP OVERLAY === */
        #zapOverlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }

        #zapOverlay.visible { opacity: 1; }

        #zapChannelNumber {
            font-size: 120px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
            line-height: 1;
        }

        #zapChannelName {
            font-size: 24px;
            font-weight: 500;
            color: var(--accent-color);
            text-shadow: 0 1px 6px rgba(0,0,0,0.7);
            margin-top: 10px;
            text-align: center;
            max-width: 400px;
        }

        #zapCategory {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }

        /* === LOADING SCREEN === */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #loadingScreen.active {
            display: flex;
            opacity: 1;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #loadingText {
            font-size: 16px;
            margin-bottom: 5px;
            text-align: center;
            font-weight: 400;
            color: white;
        }

        #loadingInfo {
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            color: #ffc857;
        }

        #retryButton {
            margin-top: 20px;
            background: var(--secondary-color);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: none;
        }

        #retryButton.visible { display: block; }

        /* === FATAL ERROR — con transición suave === */
        #fatalErrorMsg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(180,0,0,0.92);
            color: white;
            padding: 22px 32px;
            border-radius: 10px;
            z-index: 2100;
            font-size: 18px;
            font-weight: 400;
            line-height: 1.5;
            display: none;
            text-align: center;
            max-width: 80%;
            border: 1px solid rgba(255,80,80,0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #fatalErrorMsg.visible {
            display: block;
            opacity: 1;
        }

        #finalMessage {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            z-index: 2001;
            font-size: 18px;
            font-weight: 400;
            display: none;
            text-align: center;
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #streamInfo {
            position: fixed;
            top: 80px; right: 15px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 1100;
            display: none;
            border: 1px solid rgba(255,200,87,0.3);
        }

        #streamInfo.visible { display: block; }

        /* === SMART TV OVERRIDES === */
        .smart-tv .channel-card {
            box-shadow: none !important;
            transition: none;
        }

        .smart-tv .channel-logo { transition: none; }

        .smart-tv .channel-card.focused {
            transform: scale(1.04) translate3d(0,0,0);
            border-color: var(--focus-color);
        }

        .smart-tv .category-title { transition: none; }

        .smart-tv #miniEPG {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            body { font-size: 14px; }
            .channel-card { min-width: 115px; max-width: 115px; }
            .channel-logo { width: 60px; height: 60px; }
            #miniEPG { bottom: 80px; left: 15px; right: 15px; padding: 14px 18px; }
            .miniEPG-logo { width: 58px; height: 58px; }
            .miniEPG-name { font-size: 18px; }
            #zapChannelNumber { font-size: 80px; }
            #zapChannelName { font-size: 18px; }
            .control-btn-tnt { width: 50px; height: 50px; font-size: 20px; }
            .tnt-center-controls { gap: 25px; }
        }

        @media (max-width: 480px) {
            .channel-card { min-width: 100px; max-width: 100px; padding: 6px; height: 120px; }
            .channel-logo { width: 50px; height: 50px; }
            #header { padding: 0 12px; }
            #header-info { gap: 12px; }
            #datetime { display: none; }
            #miniEPG { bottom: 70px; left: 10px; right: 10px; padding: 12px 15px; }
