    const CTL_BTNS = ['skip-back-btn', 'play-pause-btn', 'skip-fwd-btn', 'back-btn'];
    let controlsTimer = null;

    /* ===================================================
       DETECCIÓN DE SMART TV
    =================================================== */
    const isSmartTV = /smart-?tv|tizen|webos|vidaa|bravia|hisense|philips|netcast|orbtv|dtv|orsay|vestel|zeasn|realtek|amlogic|mstar|arris|motorola|technicolor|pace|humax|sagemcom|kaon|tvip|dreambox|enigma|mag|formuler/i.test(navigator.userAgent);
    if (isSmartTV) document.body.classList.add('smart-tv');

    /* ===================================================
       HELPERS DE STREAM
    =================================================== */
    function detectStreamType(url) {
        if (!url) return 'hls';
        const base = url.split('|')[0].trim().toLowerCase().split('?')[0];
        if (base.endsWith('.mpd') || base.includes('/dash/') || /\/sa_live_dash|live_dash_cld|eds\/[^/]+\/sa_live/.test(base)) return 'dash';
        // ✅ FIX: ts:abr.m3u8 (cloudfront) y tracks-v1a1/mono son HLS con segmentos fMP4/TS — usar hls.js, NO 'ts'
        // El tipo 'ts' solo aplica a chunklist/chunks directos sin wrapper m3u8 padre
        if (/chunklist[^/]*\.m3u8|chunks\.m3u8/.test(base)) return 'ts';
        if (base.endsWith('.ts') || /\/tracks-v\d+a\d+\/mono\.ts/.test(base)) return 'ts';
        if (base.endsWith('.mp4')) return 'mp4';
        return 'hls';
    }

    function extractHeaders(uri) {
        const h = {};
        const parts = uri.split('|');
        for (let i = 1; i < parts.length; i++) {
            const eq = parts[i].indexOf('=');
            if (eq > 0) h[parts[i].substring(0, eq).trim()] = parts[i].substring(eq + 1).trim();
        }
        return h;
    }

    function cleanUrl(uri) { return uri.split('|')[0].trim(); }

    function normalizeDrmHex(hex) {
        return hex.replace(/[^0-9a-fA-F]/g, '').toLowerCase().substring(0, 32).padStart(32, '0');
    }

    function supportsNativeHLS() {
        const v = document.createElement('video');
        return v.canPlayType('application/vnd.apple.mpegurl') !== '' || v.canPlayType('audio/mpegurl') !== '';
    }

    /* ===================================================
       ✅ CONFIG HLS — DINÁMICA (Estable vs Baja Latencia)
       Fórmula según acaaweb.html
    =================================================== */
function buildHlsConfig(uri) {
    const isLL = state.toleranceMode === 'lowlatency';
    const url  = (uri || '').toLowerCase();

    // ✅ FIX STREAMS BLOQUEADOS: detectar streams que requieren config especial
    const isCloudFront      = url.includes('cloudfront.net');
    const isMediatique      = url.includes('mediatiquestream');
    const needsSpecialSetup = isCloudFront || isMediatique;

    const cfg = {
        enableWorker:               true,
        maxBufferLength:            isLL ? 15 : 40,
        maxMaxBufferLength:         isLL ? 30 : 90,
        liveSyncDurationCount:      isLL ? 1 : 4,
        liveMaxLatencyDurationCount:isLL ? 3 : 8,
        lowLatencyMode:             isLL,
        backBufferLength:           isLL ? 6 : 10,
        // ✅ Soporte explícito para segmentos fMP4 (#EXT-X-MAP) — necesario para cloudfront/mediatique
        enableSoftwareAES:          true,
        fragLoadingMaxRetry:        6,
        manifestLoadingMaxRetry:    4,
        levelLoadingMaxRetry:       4,
        fragLoadingRetryDelay:      500,
        manifestLoadingRetryDelay:  500,
    };

    if (needsSpecialSetup) {
        // Estos streams usan fMP4 + CDN con política de Referer/Origin estricta
        cfg.xhrSetup = function(xhr, url) {
            try {
                // Referer genérico aceptado por la mayoría de CDNs de broadcast
                xhr.setRequestHeader('Referer',        'https://www.google.com/');
                xhr.setRequestHeader('Origin',         'https://www.google.com');
                xhr.setRequestHeader('Cache-Control',  'no-cache');
            } catch(e) {}
        };
        // Buffer más tolerante para CDN con latencia variable
        cfg.maxBufferLength     = 60;
        cfg.maxMaxBufferLength  = 120;
        cfg.fragLoadingMaxRetry = 10;
    } else {
        cfg.xhrSetup = function(xhr, reqUrl) {
            try {
                if (reqUrl.includes('cloudfront.net') || reqUrl.includes('mediatiquestream')) {
                    xhr.setRequestHeader('Referer', 'https://www.google.com/');
                }
            } catch(e) {}
        };
    }

    return cfg;
}

    function buildDashConfig() {
        return {
            preferredAudioLanguage: 'es',
            preferredTextLanguage:  'es',
            streaming: {
                bufferingGoal:   30,
                rebufferingGoal: 15,                
                retryParameters: {
                    maxAttempts:   Infinity,
                    baseDelay:     1000,
                    backoffFactor: 2,
                    fuzzFactor:    0.5,
                    timeout:       0
                }
            },
            manifest: {
                retryParameters: {
                    maxAttempts: Infinity,
                    baseDelay:   1000
                }
            }
        };
    }

    /* ===================================================
       ✅ MODO DE TOLERANCIA — Cambio dinámico
    =================================================== */
    function setToleranceMode(mode) {
        state.toleranceMode = mode;
        // Badge interno desactivado para usuario final
        // Solo visible en modo debug: ?debug=1
        if (location.search.includes('debug=1')) {
            const badge = el.toleranceBadge;
            if (!badge) return;
            if (mode === 'lowlatency') {
                badge.textContent = '⚡ BAJA LATENCIA';
                badge.style.borderColor = 'rgba(255,68,68,0.5)';
                badge.style.color = '#ff6666';
            } else {
                badge.textContent = '🛡 MODO ESTABLE';
                badge.style.borderColor = 'rgba(255,200,87,0.4)';
                badge.style.color = 'var(--accent-color)';
            }
            badge.classList.add('visible');
            clearTimeout(badge._timer);
            badge._timer = setTimeout(() => badge.classList.remove('visible'), 3000);
        }
    }

    /* ===================================================
       SHAKA PLAYER — Init y config
    =================================================== */
    function lockDashTo720pAndSpanish(player) {
        if (!player) return;
        try {
            player.configure({
                preferredAudioLanguage: 'es',
                preferredTextLanguage: 'es'
            });
        } catch(e) {}
    }

    async function initShaka() {
        if (state.shakaPlayer) return state.shakaPlayer;

        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return null;

        const hevcSupport = await shaka.Player.probeSupport();
        const hevcCodecs = ['hvc1.1.4.L120.90', 'hev1.1.6.L93.90', 'hvc1.1.6.L93.B0'];
        let hevcOk = false;
        for (const c of hevcCodecs) {
            const fc = 'video/mp4; codecs="' + c + '"';
            if (hevcSupport && hevcSupport.media && hevcSupport.media[fc]) { hevcOk = true; break; }
        }
        if (!hevcOk) { /* HEVC/H.265 no soportado — usando fallback */ }

        const player = new shaka.Player(el.video);
        state.shakaPlayer = player;
        player.configure(buildDashConfig());

        const nwEngine = player.getNetworkingEngine();

        nwEngine.addEventListener('retry', (event) => {
            if (!event || !event.error) return;
            const code = event.error.code;
            const data = event.error.data;
            if (code === shaka.util.Error.Code.BAD_HTTP_STATUS && Array.isArray(data)) {
                if ((data[1] === 404 && data[4] === shaka.net.NetworkingEngine.RequestType.MANIFEST) ||
                    (data[1] === 401 || data[1] === 403)) {
                    event.preventDefault();
                    event.error.severity = shaka.util.Error.Severity.CRITICAL;
                }
            }
        });

        player.addEventListener('buffering', (e) => {
            if (e.buffering) showLoaderDelayed();
            else hideLoader();
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                request.headers['Accept'] = 'application/dash+xml,video/vnd.mpeg.dash.mpd';
            }
            if (request.uris && request.uris[0] && request.uris[0].includes('latamlive.net')) {
                request.headers['Referer'] = 'https://www.espn.com.ar/';
                request.headers['Origin'] = 'https://www.espn.com.ar';
            }
            if (state.currentChannelData) {
                const headers = extractHeaders(state.currentChannelData.uri);
                Object.assign(request.headers, headers);
            }
        });

        /* ✅ ERROR DE SHAKA — Con Exponential Back-off */
        player.addEventListener('error', (event) => {
            const err = event.detail;
            if (state.shakaPlayer !== player) return;
            if (err.severity === shaka.util.Error.Severity.CRITICAL) {
                if (state.retries < state.maxRetries && state.currentChannelData) {
                    state.retries++;
                    const delay = Math.min(500 * Math.pow(1.8, state.retries - 1), 15000);
                    /* reintento Shaka #' + state.retries + ' */
                    showLoaderDelayed();
                    setTimeout(() => {
                        if (state.currentChannelData) reloadCurrentStream();
                    }, delay);
                } else {
                    showFatalError('Canal no disponible en este momento.');
                }
            }
        });

        player.addEventListener('trackschanged', () => {
            lockDashTo720pAndSpanish(player);
            try {
                const textTracks = player.getTextTracks();
                if (textTracks && textTracks.length > 0) {
                    const esTrack = textTracks.find(t => t.language === 'es') || textTracks[0];
                    if (esTrack) {
                        player.selectTextTrack(esTrack);
                        player.setTextTrackVisibility(true);
                    }
                }
            } catch(e) {}
        });

        return player;
    }

    /* ===================================================
       LOADER — Con transición suave
    =================================================== */
    function showLoaderDelayed(urgency) {
        if (state.loaderDelayTimer) return;
        const delay = (urgency === 'immediate' || state.isFirstLoad) ? 300 : 1800;
        state.loaderDelayTimer = setTimeout(() => {
            el.loader.classList.add('active');
        }, delay);
    }

    function hideLoader() {
        if (state.loaderDelayTimer) {
            clearTimeout(state.loaderDelayTimer);
            state.loaderDelayTimer = null;
        }
        el.loader.classList.remove('active');
    }

    function showLoaderImmediate() {
        hideLoader();
        el.loader.classList.add('active');
    }

    function showLoadingScreen(text) {
        el.loadingText.textContent = text || 'Cargando canal...';
        el.loadingInfo.textContent = 'MERE | TV';
        el.loadingScreen.classList.add('active');
        el.retryButton.classList.remove('visible');
    }

    function hideLoadingScreen() { el.loadingScreen.classList.remove('active'); }

    function showRetryButton() {
        el.retryButton.classList.add('visible');
        el.retryButton.onclick = () => {
            if (state.currentChannelData) playChannel(state.currentChannelData);
        };
    }

    let _fatalMsgTimer = null;
    function showFatalError(msg) {
        hideLoader();
        hideLoadingScreen();
        el.fatalErrorMsg.textContent = msg || 'Canal no disponible. Volviendo al menú...';
        el.fatalErrorMsg.classList.add('visible');
        if (_fatalMsgTimer) clearTimeout(_fatalMsgTimer);
        _fatalMsgTimer = setTimeout(() => {
            el.fatalErrorMsg.classList.remove('visible');
            closePlayer();
        }, 4000);
    }

    /* ===================================================
       VIDEO EVENTS
    =================================================== */
    function setupVideoEvents(video) {
        video.addEventListener('playing', () => {
            hideLoader();
            hideLoadingScreen();
            state.mediaErrorCount   = 0;
            state.networkErrorCount = 0;
            state.retries           = 0; // Reset retries al reproducir exitosamente
            state.isFirstLoad       = false; // Volvemos a delay normal para rebuffering
            syncPlayPauseIcon();
        });

        video.addEventListener('waiting',  () => showLoaderDelayed());
        video.addEventListener('pause',    () => { state.pauseTimestamp = Date.now(); hideLoader(); syncPlayPauseIcon(); });
        video.addEventListener('stalled',  () => showLoaderDelayed());
        video.addEventListener('canplay',  () => hideLoader());
        video.addEventListener('timeupdate', () => { if (!video.paused) hideLoader(); });
        video.addEventListener('error',    () => hideLoader());

        video.addEventListener('play', () => {
            if (state.pauseTimestamp !== null) {
                const pausedMs = Date.now() - state.pauseTimestamp;
                state.pauseTimestamp = null;
                if (pausedMs > 5000 && state.mode === 'player') {
                    handleResumeFromPause(video, pausedMs);
                }
            }
            hideLoader();
            syncPlayPauseIcon();
        });
    }

    function syncPlayPauseIcon() {
        const btn = el.playPauseBtn;
        if (!btn) return;
        const icon = btn.querySelector('i');
        if (!icon) return;
        const video = el.video;
        if (video && !video.paused) icon.className = 'fas fa-pause';
        else icon.className = 'fas fa-play';
    }

    async function handleResumeFromPause(video, pausedMs) {
        const LONG_PAUSE_MS = 30000;
        try {
            if (state.currentType === 'dash' && state.shakaPlayer) {
                const seekRange = state.shakaPlayer.seekRange();
                if (seekRange && seekRange.end > 0) {
                    const liveEdge = seekRange.end;
                    if (pausedMs > LONG_PAUSE_MS || liveEdge - video.currentTime > 60) {
                        showLoaderImmediate();
                        try { video.currentTime = Math.max(0, liveEdge - 2); }
                        catch(seekErr) { await silentReload(); }
                    }
                }
            } else if (state.hlsInstance) {
                if (pausedMs > LONG_PAUSE_MS) {
                    showLoaderImmediate();
                    try {
                        const livePos = state.hlsInstance.liveSyncPosition;
                        if (livePos && isFinite(livePos) && livePos > 0) video.currentTime = livePos;
                        else await silentReload();
                    } catch(e) { await silentReload(); }
                }
            }
        } catch(e) { await silentReload(); }
    }

    async function silentReload() {
        if (!state.currentChannelData) return;
        const ch     = state.currentChannelData;
        const loadId = state.currentLoadId;
        showCurtain();
        showLoaderImmediate();
        await nuclearDestroyPlayers(ch);
        if (loadId !== state.currentLoadId) return;
        hideCurtainWhenPlaying(el.video);
        switch (detectStreamType(ch.uri)) {
            case 'dash': await playWithDash(ch, true); break;
            default:     playWithHlsJs(ch, true);      break;
        }
    }

    /* ===================================================
       CURTAIN — Transición suave
    =================================================== */
    function showCurtain() {
        el.videoCurtain.classList.remove('transparent');
    }

    function hideCurtainWhenPlaying(video) {
        const onPlaying = () => {
            if ((video.readyState >= 3 || video.currentTime > 0) && !video.paused) {
                el.videoCurtain.classList.add('transparent');
                video.removeEventListener('playing',    onPlaying);
                video.removeEventListener('timeupdate', onTimeUpdate);
            }
        };
        const onTimeUpdate = () => {
            if ((video.readyState >= 3 || video.currentTime > 0) && !video.paused) {
                el.videoCurtain.classList.add('transparent');
                video.removeEventListener('playing',    onPlaying);
                video.removeEventListener('timeupdate', onTimeUpdate);
            }
        };
        video.addEventListener('playing',    onPlaying);
        video.addEventListener('timeupdate', onTimeUpdate);
    }

    /* ===================================================
       PURGE / DESTROY PLAYERS
    =================================================== */
    function purgeSubtitleDOM() {
        document.querySelectorAll('.shaka-text-container, .shaka-text-wrapper').forEach(node => {
            try { node.innerHTML = ''; } catch(e) {}
            try { node.remove(); }      catch(e) {}
        });
        const videoEl = el.video;
        if (!videoEl) return;
        Array.from(videoEl.querySelectorAll('track')).forEach(t => { try { videoEl.removeChild(t); } catch(e) {} });
        try { for (let i = 0; i < videoEl.textTracks.length; i++) videoEl.textTracks[i].mode = 'disabled'; } catch(e) {}
    }

    function cloneVideoElement() {
        const container = document.getElementById('player-container');
        const oldVideo  = document.getElementById('video-player');
        if (!oldVideo || !container) return;
        try { const src = oldVideo.src; if (src && src.startsWith('blob:')) URL.revokeObjectURL(src); } catch(e) {}
        try { oldVideo.pause(); }          catch(e) {}
        try { oldVideo.src = ''; }         catch(e) {}
        try { oldVideo.load(); }           catch(e) {}
        try { oldVideo.srcObject = null; } catch(e) {}
        const newVideo = document.createElement('video');
        newVideo.id            = 'video-player';
        newVideo.setAttribute('playsinline', '');
        newVideo.setAttribute('webkit-playsinline', '');
        newVideo.preload       = 'none';
        newVideo.autoplay      = true;
        newVideo.style.cssText = 'width:100%;height:100%;background:#000;transform:translate3d(0,0,0);-webkit-transform:translate3d(0,0,0);backface-visibility:hidden;-webkit-backface-visibility:hidden;position:relative;z-index:1;';
        newVideo.muted         = false;
        newVideo.volume        = 1.0;
        container.insertBefore(newVideo, document.getElementById('video-curtain'));
        container.removeChild(oldVideo);
        setupVideoEvents(newVideo);
    }

    async function nuclearDestroyPlayers(nextChannel) {
        if (state.autoRetryTimer)   { clearTimeout(state.autoRetryTimer);   state.autoRetryTimer = null; }
        if (state.loaderDelayTimer) { clearTimeout(state.loaderDelayTimer); state.loaderDelayTimer = null; }

        const nextType = nextChannel ? detectStreamType(nextChannel.uri) : null;
        const prevType = state.currentType;

        const v = el.video;
        try { v.pause(); }   catch(e) {}
        try { v.src = ''; }  catch(e) {}
        try { v.load(); }    catch(e) {}

        if (state.hlsInstance) {
            try { state.hlsInstance.stopLoad();    } catch(e) {}
            try { state.hlsInstance.detachMedia(); } catch(e) {}
            // Siempre destruir la instancia HLS anterior — evita corrupción de audio
            try { state.hlsInstance.destroy(); } catch(e) {}
            state.hlsInstance = null;
        }

        if (state.shakaPlayer) {
            const p = state.shakaPlayer;
            // Destruir solo si el próximo canal NO es DASH
            if (nextType && nextType !== 'dash') {
                state.shakaPlayer = null;
                try { p.setTextTrackVisibility(false); } catch(e) {}
                purgeSubtitleDOM();
                try { await p.unload();  } catch(e) {}
                try { await p.destroy(); } catch(e) {}
            } else {
                // Reusar instancia — solo descargar el contenido actual
                try { p.setTextTrackVisibility(false); } catch(e) {}
                purgeSubtitleDOM();
                try { await p.unload(); } catch(e) {}
                // Mantener state.shakaPlayer = p para reutilizar
            }
        }

        purgeSubtitleDOM();

        // ✅ FIX AUDIO MUDO: Clonar el elemento video al cambiar entre canales HLS/TS
        // El estado de audio del <video> se corrompe tras destroy/re-attach repetidos.
        // Clonar reemplaza el nodo DOM con uno limpio, garantizando volume=1 y muted=false.
        if (nextType && (nextType === 'hls' || nextType === 'ts' || nextType === 'mp4')) {
            cloneVideoElement();
            // Si Shaka sigue vivo (reutilizado), re-adjuntarlo al nuevo nodo <video>
            if (state.shakaPlayer) {
                try { await state.shakaPlayer.attach(el.video); } catch(e) {}
            }
        }

        await new Promise(r => setTimeout(r, 80)); // tick mínimo de limpieza
    }

    async function resetVideoElement() {
        await nuclearDestroyPlayers();
        const v = el.video;
        if (!v) return;
        try { v.removeAttribute('src'); } catch(e) {}
        try { v.load(); }                 catch(e) {}
        v.muted  = false;
        v.volume = 1.0;
        state.mediaErrorCount   = 0;
        state.networkErrorCount = 0;
    }

    async function reloadCurrentStream() {
        if (!state.currentChannelData) return;
        state.mediaErrorCount   = 0;
        state.networkErrorCount = 0;
        showCurtain();
        await nuclearDestroyPlayers(state.currentChannelData);
        const v = el.video;
        if (v) { try { v.removeAttribute('src'); } catch(e) {} try { v.load(); } catch(e) {} }
        hideCurtainWhenPlaying(el.video);
        const ch = state.currentChannelData;
        switch (detectStreamType(ch.uri)) {
            case 'dash': await playWithDash(ch); break;
            default:     playWithHlsJs(ch);      break;
        }
    }

    function scheduleKickstart(video) {
        setTimeout(() => {
            if (video && !video.paused && video.currentTime === 0 && video.readyState >= 2) {
                try { video.currentTime += 0.3; } catch(e) {}
            }
        }, 2000);
    }

    /* ===================================================
       ✅ PLAY HLS — Con Exponential Back-off (xALB)
    =================================================== */
    function playWithHlsJs(channel, silent = false) {
        const cleanUri        = cleanUrl(channel.uri);
        const capturedLoadId  = state.currentLoadId;

        if (state.hlsInstance) {
            try { state.hlsInstance.destroy(); } catch(e) {}
            state.hlsInstance = null;
        }

        showLoaderImmediate();
        if (!silent) showLoadingScreen('Cargando | ' + channel.name);

        setTimeout(() => {
            if (capturedLoadId !== state.currentLoadId) return;

            if (Hls.isSupported()) {
                const hls = new Hls(buildHlsConfig(cleanUri));
                state.hlsInstance = hls;

                hls.loadSource(cleanUri);
                hls.attachMedia(el.video);

                hls.on(Hls.Events.MEDIA_ATTACHED, () => {
                    if (capturedLoadId !== state.currentLoadId) return;
                    hls.startLoad(-1);
                });

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (capturedLoadId !== state.currentLoadId) return;
                    const vid = el.video;
                    // ✅ FIX AUDIO: garantizar que el elemento clonado tenga audio antes de play
                    vid.muted  = false;
                    vid.volume = 1.0;
                    vid.play().catch(() => {
                        // Autoplay bloqueado por el navegador — usar muted como puente temporal
                        vid.muted = true;
                        vid.play().then(() => {
                            // Restaurar audio tras arrancar (máx 1.5s)
                            setTimeout(() => { vid.muted = false; vid.volume = 1.0; }, 800);
                        }).catch(() => {});
                    });
                });

                hls.on(Hls.Events.FRAG_BUFFERED, () => {
                    if (capturedLoadId === state.currentLoadId && !el.video.paused) hideLoader();
                });

                /* ✅ ERROR HLS — Algoritmo Exponential Back-off (xALB) */
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (capturedLoadId !== state.currentLoadId) return;

                    if (!data.fatal) {
                        if (data.type === Hls.ErrorTypes.MEDIA_ERROR ||
                            data.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR ||
                            data.details === Hls.ErrorDetails.BUFFER_NUDGE_ON_STALL) {
                            showLoaderDelayed();
                        }
                        return;
                    }

                    /* ERROR FATAL — Calcula delay exponencial */
                    if (state.retries < state.maxRetries) {
                        state.retries++;
                        /* Fórmula del prompt: Math.min(500 * Math.pow(1.8, retries - 1), 15000) */
                        const delay = Math.min(500 * Math.pow(1.8, state.retries - 1), 15000);
                        /* reintento HLS #' + state.retries + ' */
                        showLoaderDelayed();

                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            setTimeout(() => {
                                if (capturedLoadId === state.currentLoadId) hls.startLoad();
                            }, delay);
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            setTimeout(() => {
                                if (capturedLoadId === state.currentLoadId) hls.recoverMediaError();
                            }, delay);
                        } else {
                            setTimeout(() => {
                                if (capturedLoadId === state.currentLoadId) silentReload();
                            }, delay);
                        }
                    } else {
                        /* Máximo de reintentos alcanzado */
                        showFatalError('Canal no disponible en este momento.');
                    }
                });

            } else if (supportsNativeHLS()) {
                const vid = el.video;
                vid.muted  = false;
                vid.volume = 1.0;
                vid.src = cleanUri;
                vid.addEventListener('loadedmetadata', () => {
                    if (capturedLoadId !== state.currentLoadId) return;
                    vid.play().catch(() => {
                        vid.muted = true;
                        vid.play().then(() => setTimeout(() => { vid.muted = false; vid.volume = 1.0; }, 800)).catch(() => {});
                    });
                }, { once: true });
            }
        }, 120);
    }

    /* ===================================================
       ✅ PLAY DASH — Con Exponential Back-off
    =================================================== */
    async function playWithDash(channel, silent = false) {
        const capturedLoadId = state.currentLoadId;

        showLoaderImmediate();
        if (!silent) showLoadingScreen('Cargando ' + channel.name + '...');

        try {
            if (capturedLoadId !== state.currentLoadId) return;

            const player = await initShaka();
            if (!player) { showFatalError('Este canal no está disponible en tu dispositivo.'); return; }

            if (capturedLoadId !== state.currentLoadId) return;

            if (channel.drm && channel.drm.keyId && channel.drm.key) {
                const keyId = normalizeDrmHex(channel.drm.keyId);
                const key   = normalizeDrmHex(channel.drm.key);
                player.configure({ drm: { clearKeys: { [keyId]: key } } });
            } else {
                player.configure({ drm: { clearKeys: {} } });
            }

            await player.load(cleanUrl(channel.uri));

            if (capturedLoadId !== state.currentLoadId) return;

            lockDashTo720pAndSpanish(player);

            const playP = el.video.play();
            if (playP !== undefined) {
                playP.catch(() => {
                    el.video.muted = true;
                    el.video.play().then(() => setTimeout(() => { el.video.muted = false; el.video.volume = 1.0; }, 800)).catch(() => {});
                });
            }

            scheduleKickstart(el.video);

        } catch (error) {
            if (capturedLoadId !== state.currentLoadId) return;
            if (state.retries < state.maxRetries) {
                state.retries++;
                const delay = Math.min(500 * Math.pow(1.8, state.retries - 1), 15000);
                /* reintento DASH #' + state.retries + ' */
                showLoaderDelayed();
                setTimeout(async () => {
                    if (capturedLoadId === state.currentLoadId) await silentReload();
                }, delay);
            } else {
                showFatalError('No fue posible cargar este canal.');
            }
        }
    }

    /* ===================================================
       CONTROLES DEL PLAYER
    =================================================== */
    function showControls() {
        const controls = document.getElementById('player-controls');
        if (!controls) return;
        controls.classList.remove('hidden');
        state.controlsVisible = true;

        if (state.currentChannelData) {
            const logoImg  = el.tntTickerLogo;
            const nameSpan = el.tntTickerName;
            if (logoImg)  logoImg.src         = state.currentChannelData.logo || '';
            if (nameSpan) nameSpan.textContent = state.currentChannelData.name || 'CANAL';
        }

        CTL_BTNS.forEach(id => {
            const btn = document.getElementById(id);
            if (btn) btn.classList.remove('focused');
        });
        state.focusedBtnIndex = 1;
        const defaultBtn = document.getElementById(CTL_BTNS[state.focusedBtnIndex]);
        if (defaultBtn) defaultBtn.classList.add('focused');

        syncPlayPauseIcon();
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(hideControls, 5000);
    }

    function hideControls() {
        const controls = document.getElementById('player-controls');
        if (controls) controls.classList.add('hidden');
        state.controlsVisible = false;
        CTL_BTNS.forEach(id => {
            const btn = document.getElementById(id);
            if (btn) btn.classList.remove('focused');
        });
        clearTimeout(controlsTimer);
    }

    function moveFocus(dir) {
        if (!state.controlsVisible) return;
        const currentBtn = document.getElementById(CTL_BTNS[state.focusedBtnIndex]);
        if (currentBtn) currentBtn.classList.remove('focused');
        state.focusedBtnIndex = (state.focusedBtnIndex + dir + CTL_BTNS.length) % CTL_BTNS.length;
        const nextBtn = document.getElementById(CTL_BTNS[state.focusedBtnIndex]);
        if (nextBtn) nextBtn.classList.add('focused');
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(hideControls, 5000);
    }

    function executeFocusedBtn() {
        if (!state.controlsVisible) return;
        const id = CTL_BTNS[state.focusedBtnIndex];
        if (id === 'play-pause-btn') {
            const video = el.video;
            if (!video) return;
            if (video.paused) video.play().catch(() => { video.muted = true; video.play(); });
            else video.pause();
            syncPlayPauseIcon();
        } else if (id === 'skip-back-btn') {
            skipTime(-10);
        } else if (id === 'skip-fwd-btn') {
            skipTime(10);
        } else if (id === 'back-btn') {
            closePlayer();
        }
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(hideControls, 5000);
    }

    function skipTime(seconds) {
        const video = el.video;
        if (!video) return;
        try { video.currentTime = Math.max(0, video.currentTime + seconds); } catch(e) {}
    }

    async function closePlayer() {
        state.mode            = 'menu';
        state.controlsVisible = false;
        state.currentLoadId++;
        state.retries         = 0;
        state.isFirstLoad     = true; // ✅ FIX: próximo canal muestra loader rápido

        el.playerOverlay.classList.remove('active');
        hideMiniEPG();
        el.zapOverlay.classList.remove('visible');
        hideLoader();
        hideControls();
        clearTimeout(controlsTimer);

        try {
            if (state.shakaPlayer) {
                const p = state.shakaPlayer;
                state.shakaPlayer = null;
                try { await p.unload();  } catch(e) {}
                try { await p.destroy(); } catch(e) {}
            }
            if (state.hlsInstance) {
                try { state.hlsInstance.stopLoad();    } catch(e) {}
                try { state.hlsInstance.detachMedia(); } catch(e) {}
                try { state.hlsInstance.destroy();     } catch(e) {}
                state.hlsInstance = null;
            }
            const v = el.video;
            try { v.pause();  } catch(e) {}
            try { v.src = ''; } catch(e) {}
            try { v.load();   } catch(e) {}
            // ✅ FIX: limpiar estado de audio al cerrar para que el próximo canal arranque sin mudo
            try { v.muted = false; v.volume = 1.0; } catch(e) {}
        } catch(e) {}

        setTimeout(() => { el.playerOverlay.style.display = 'none'; }, 200);

        showCurtain();
        state.categoryIndex = state.lastMenuCatIdx || 0;
        state.channelIndex  = state.lastMenuChIdx  || 0;
        setTimeout(() => { focusChannel(); }, 250);
    }

    /* ===================================================
       ✅ ZAPPING — Con debounce de 300ms
    =================================================== */
    function zapToChannel(dir) {
        /* Cancela el zap anterior si el usuario sigue navegando */
        if (state.zapDebounceTimer) clearTimeout(state.zapDebounceTimer);
        /* Oculta miniEPG al iniciar zapping */
        el.miniEPG.classList.remove('visible');
        clearTimeout(state.epgTimeout);

        const cats       = Object.keys(channelsByCategory);
        const catChannels = channelsByCategory[cats[state.categoryIndex]];
        let ni = state.channelIndex + dir;
        let nc = state.categoryIndex;

        if (ni < 0) {
            nc = state.categoryIndex > 0 ? state.categoryIndex - 1 : cats.length - 1;
            ni = channelsByCategory[cats[nc]].length - 1;
        } else if (ni >= catChannels.length) {
            nc = state.categoryIndex < cats.length - 1 ? state.categoryIndex + 1 : 0;
            ni = 0;
        }

        state.categoryIndex = nc;
        state.channelIndex  = ni;
        const ch = channelsByCategory[cats[nc]][ni];

        /* Muestra el overlay inmediatamente (feedback visual sin lag) */
        if (ch) showZapOverlay(ch, cats[nc]);

        /* Carga el canal solo si el usuario se detiene 300ms */
        state.zapDebounceTimer = setTimeout(() => {
            if (ch) playChannel(ch);
        }, 300);
    }

    /* ===================================================
       TECLADO
    =================================================== */
    let _lastKeyTime = 0;
    const KEY_THROTTLE_MS = 150;

    function handlePlayerKeydown(e) {
        e.preventDefault();
        if (e.key === 'Enter' || e.key === 'OK' || e.key === ' ') {
            if (!state.controlsVisible) showControls();
            else executeFocusedBtn();
            return;
        }

        if (!state.controlsVisible) {
            switch (e.key) {
                case 'ArrowUp':    zapToChannel(-1); break;
                case 'ArrowDown':  zapToChannel(1);  break;
                case 'ArrowLeft':
                case 'ArrowRight':
                    if (el.miniEPG.classList.contains('visible')) hideMiniEPG();
                    else { updateMiniEPG(state.currentChannelData); showMiniEPG(); }
                    break;
            }
        } else {
            switch (e.key) {
                case 'ArrowLeft':  moveFocus(-1); break;
                case 'ArrowRight': moveFocus(1);  break;
                case 'ArrowUp': case 'ArrowDown':
                    clearTimeout(controlsTimer);
                    controlsTimer = setTimeout(hideControls, 5000);
                    break;
                case 'Escape': case 'Backspace': case 'BrowserBack': case 'Back':
                    hideControls();
                    break;
            }
        }
    }

    function handleMenuKeydown(e) {
        e.preventDefault();
        switch (e.key) {
            case 'ArrowUp':    moveVertical(-1);   break;
            case 'ArrowDown':  moveVertical(1);    break;
            case 'ArrowLeft':  moveHorizontal(-1); break;
            case 'ArrowRight': moveHorizontal(1);  break;
            case 'Enter': case 'OK': case ' ':
                playChannelFromMenu(state.categoryIndex, state.channelIndex);
                break;
        }
    }

    document.addEventListener('keydown', (e) => {
        const nav = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','OK','Backspace','Escape','BrowserBack','Back',' '];
        if (nav.includes(e.key) || e.keyCode === 10009) e.preventDefault();

        const now = Date.now();
        if (now - _lastKeyTime < KEY_THROTTLE_MS) return;
        _lastKeyTime = now;

        const isBackKey = e.key === 'Escape' || e.key === 'Backspace' ||
                          e.key === 'BrowserBack' || e.key === 'Back' || e.keyCode === 10009;

        if (isBackKey && state.mode === 'player') {
            if (state.controlsVisible) hideControls();
            else closePlayer();
            return;
        }

        if      (state.mode === 'player') handlePlayerKeydown(e);
        else if (state.mode === 'menu')   handleMenuKeydown(e);
    });

    /* Click en controles del player */
    document.getElementById('player-container').addEventListener('click', (e) => {
        const btn = e.target.closest('.control-btn-tnt');
        if (btn) {
            const id = btn.id;
            if      (id === 'play-pause-btn') { const pi = state.focusedBtnIndex; state.focusedBtnIndex = CTL_BTNS.indexOf('play-pause-btn'); executeFocusedBtn(); state.focusedBtnIndex = pi; }
            else if (id === 'skip-back-btn')  skipTime(-10);
            else if (id === 'skip-fwd-btn')   skipTime(10);
            else if (id === 'back-btn')        closePlayer();
            return;
        }
        const v = el.video;
        if (e.target === v || e.target === document.getElementById('player-container')) {
            state.controlsVisible ? hideControls() : showControls();
        }
    });

    /* ===================================================
       NAVEGACIÓN DE MENÚ
    =================================================== */
    function scrollToCategory(idx) {
        const cat = state.categories[idx];
        if (!cat) return;
        el.mainContent.scrollTop = cat.offsetTop - 20;
    }

    function scrollToChannelInRow(catIdx, chIdx) {
        /* ✅ Virtual Scroller: actualiza el offset en lugar de llamar scrollLeft */
        const vsData = state.vsData[catIdx];
        if (!vsData) return;
        const track    = vsData.track;
        const itemW    = vsData.itemW;
        const gap      = vsData.gap;
        const count    = vsData.channels.length;
        const viewport = vsData.viewport;
        if (!track || !viewport) return;

        /* Calcula el offset para centrar el elemento seleccionado */
        const viewW    = viewport.offsetWidth;
        const itemFull = itemW + gap;
        const targetX  = chIdx * itemFull - (viewW / 2) + (itemW / 2);
        const maxX     = Math.max(0, count * itemFull - gap - viewW);
        const clampedX = Math.max(0, Math.min(targetX, maxX));

        /* Aceleración GPU: transform en lugar de scrollLeft */
        track.style.transform = 'translate3d(' + (-clampedX) + 'px, 0, 0)';
        vsData.offsetX = clampedX;
    }

    function moveVertical(dir) {
        const ni = state.categoryIndex + dir;
        if (ni < 0 || ni >= state.categories.length) return;
        state.categoryIndex = ni;
        const cats = Object.keys(channelsByCategory);
        state.channelIndex = Math.min(state.channelIndex, channelsByCategory[cats[ni]].length - 1);
        scrollToCategory(ni);
        focusChannel();
    }

    function moveHorizontal(dir) {
        const vsData = state.vsData[state.categoryIndex];
        if (!vsData) return;
        const ni = state.channelIndex + dir;
        if (ni < 0 || ni >= vsData.channels.length) return;
        state.channelIndex = ni;
        scrollToChannelInRow(state.categoryIndex, ni);
        focusChannel();
    }

    function focusChannel() {
        document.querySelectorAll('.channel-card.focused').forEach(e => {
            e.classList.remove('focused');
            e.style.willChange = 'auto';
        });
        document.querySelectorAll('.category-title.selected').forEach(e => e.classList.remove('selected'));

        const vsData = state.vsData[state.categoryIndex];
        if (!vsData || !vsData.cards) return;
        const card = vsData.cards[state.channelIndex];
        if (card) {
            card.classList.add('focused');
            card.style.willChange = 'transform';
            scrollToChannelInRow(state.categoryIndex, state.channelIndex);
        }
        const title = document.querySelector('.category-title[data-category-index="' + state.categoryIndex + '"]');
        if (title) title.classList.add('selected');
    }

    function playChannelFromMenu(catIdx, chIdx) {
        const cats = Object.keys(channelsByCategory);
        const ch   = channelsByCategory[cats[catIdx]] && channelsByCategory[cats[catIdx]][chIdx];
        if (!ch) return;

        state.lastMenuCatIdx     = catIdx;
        state.lastMenuChIdx      = chIdx;
        state.categoryIndex      = catIdx;
        state.channelIndex       = chIdx;
        state.currentChannelData = ch;
        state.mode               = 'player';
        state.controlsVisible    = false;

        el.playerOverlay.style.display = 'flex';
        setTimeout(() => el.playerOverlay.classList.add('active'), 10);
        playChannel(ch);
    }

    /* ===================================================
       REPRODUCCIÓN PRINCIPAL
    =================================================== */
    async function playChannel(channel) {
        if (!channel) return;

        const loadId = ++state.currentLoadId;
        state.retries = 0; // Reset reintentos al cambiar de canal
        state.isFirstLoad = true; // Loader rápido en primer arranque

        state.currentChannelData = channel;
        state.isLoading          = true;
        state.currentUrl         = channel.uri;
        state.currentType        = detectStreamType(channel.uri);
        state.pauseTimestamp     = null;

        const catNames = Object.keys(channelsByCategory);
        const catName  = catNames[state.categoryIndex] || '';

        showZapOverlay(channel, catName);
        showLoadingScreen('Cargando | ' + channel.name);
        showLoaderImmediate();
        showCurtain();

        await nuclearDestroyPlayers(channel);

        if (loadId !== state.currentLoadId) return;

        // ✅ FIX: hideCurtainWhenPlaying debe usar el.video DESPUÉS del clone (nuclearDestroyPlayers)
        hideCurtainWhenPlaying(el.video);

        el.finalMessage.style.display = 'none';
        el.fatalErrorMsg.classList.remove('visible');

        try {
            switch (state.currentType) {
                case 'dash':                      await playWithDash(channel);  break;
                case 'ts': case 'mp4': case 'hls':
                default:                          playWithHlsJs(channel);       break;
            }
            state.isLoading = false;
            updateMiniEPG(channel);
            showMiniEPG();
        } catch (error) {
            if (loadId !== state.currentLoadId) return;
            showFatalError('Canal no disponible en este momento.');
            state.isLoading = false;
        }
    }

    /* ===================================================
       MINI EPG
    =================================================== */
    function showMiniEPG() {
        el.miniEPG.classList.add('visible');
        clearTimeout(state.epgTimeout);
        state.epgTimeout = setTimeout(() => el.miniEPG.classList.remove('visible'), 4000);
    }

    function hideMiniEPG() {
        el.miniEPG.classList.remove('visible');
        clearTimeout(state.epgTimeout);
    }

    function showZapOverlay(channel, catName) {
        el.zapNum.textContent  = channel.number || '--';
        el.zapName.textContent = channel.name   || 'Canal';
        el.zapCat.textContent  = catName        || '';
        el.zapOverlay.classList.add('visible');
        clearTimeout(state.zapOverlayTimeout);
        state.zapOverlayTimeout = setTimeout(() => el.zapOverlay.classList.remove('visible'), 1500);
    }

    function updateMiniEPG(channel) {
        if (!channel) return;
        const fallback = 'https://via.placeholder.com/68x68/001845/ffffff?text=TV';
        el.epgLogo.src     = channel.logo || fallback;
        el.epgLogo.onerror = () => { el.epgLogo.src = fallback; };
        el.epgName.textContent   = channel.name   || 'Canal';
        el.epgNumber.textContent = channel.number ? 'Canal ' + channel.number : 'LIVE';
        const now = new Date();
        const hh  = now.getHours().toString().padStart(2, '0');
        const mm  = now.getMinutes().toString().padStart(2, '0');
        const nh  = ((now.getHours() + 1) % 24).toString().padStart(2, '0');
        el.epgNowText.textContent  = 'Ahora: ' + hh + ':' + mm + ' - ' + (channel.epg && channel.epg.now  ? channel.epg.now  : 'Programación en vivo');
        el.epgNextText.textContent = 'Próximo: ' + nh + ':00 - ' + (channel.epg && channel.epg.next ? channel.epg.next : 'Continúa');
    }

    /* ===================================================
       ✅ VIRTUAL SCROLLER — Renderizado solo del viewport
       Elimina lag con listas extensas en Smart TV
    =================================================== */
    state.vsData = []; // Array de datos por categoría

    function buildVirtualRow(catIdx, catName, channels) {
        const ITEM_W = 140;
        const GAP    = 12;
        const HEIGHT = 140;

        /* Sección principal */
        const section = document.createElement('section');
        section.className = 'category-section';

        /* Título */
        const title = document.createElement('h2');
        title.className = 'category-title';
        title.textContent = catName;
        title.dataset.categoryIndex = catIdx;
        section.appendChild(title);

        /* Wrapper */
        const wrapper = document.createElement('div');
        wrapper.className = 'channels-row-wrapper';

        /* Viewport (ventana visible) */
        const viewport = document.createElement('div');
        viewport.className = 'vs-viewport';
        viewport.style.height = HEIGHT + 'px';

        /* Track interior (se mueve con translate3d) */
        const totalWidth = channels.length * (ITEM_W + GAP) - GAP;
        const track = document.createElement('div');
        track.className = 'vs-track';
        track.style.width = totalWidth + 'px';
        track.style.height = HEIGHT + 'px';

        /* ✅ Renderiza TODAS las cards pero con will-change y translate3d */
        const cards = [];
        channels.forEach((ch, chIdx) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.dataset.categoryIndex = catIdx;
            card.dataset.channelIndex  = chIdx;
            card.style.left = 'auto'; // posición controlada por flex en track

            const img = document.createElement('img');
            img.className = 'channel-logo';
            img.alt       = ch.name;
            img.loading   = 'lazy';
            img.decoding  = 'async';
            img.onerror   = function () { this.src = 'https://via.placeholder.com/65x65/001845/ffffff?text=TV'; };
            /* ✅ Carga diferida: solo pone src cuando es visible (IntersectionObserver) */
            img.dataset.src = ch.logo;

            const info = document.createElement('div');
            info.className = 'channel-info';

            const nameEl = document.createElement('div');
            nameEl.className   = 'channel-name';
            nameEl.textContent = ch.name;

            const numEl = document.createElement('div');
            numEl.className   = 'channel-number';
            numEl.textContent = 'Canal ' + ch.number;

            info.append(nameEl, numEl);
            card.append(img, info);

            const openChannel = () => {
                state.categoryIndex = catIdx;
                state.channelIndex  = chIdx;
                focusChannel();
                playChannelFromMenu(catIdx, chIdx);
            };

            card.addEventListener('click',      openChannel);
            card.addEventListener('touchend',   (e) => { e.preventDefault(); openChannel(); });
            card.addEventListener('mouseenter', () => {
                card.style.willChange = 'transform';
                if (state.mode === 'menu') {
                    state.categoryIndex = catIdx;
                    state.channelIndex  = chIdx;
                    focusChannel();
                }
            });
            card.addEventListener('mouseleave', () => {
                if (!card.classList.contains('focused')) {
                    card.style.willChange = 'auto';
                }
            });

            if (ch.disabled === true) {
                card.style.opacity = '0.35';
                card.style.pointerEvents = 'none';
                card.setAttribute('aria-disabled', 'true');
            }

            track.appendChild(card);
            cards.push(card);
        });

        viewport.appendChild(track);
        wrapper.appendChild(viewport);
        section.appendChild(wrapper);

        /* Guarda referencias VS */
        state.vsData[catIdx] = {
            track, viewport, cards, channels,
            itemW: ITEM_W, gap: GAP,
            offsetX: 0
        };

        return section;
    }

    /* ✅ IntersectionObserver para lazy-load de imágenes */
    function setupImageLazyLoad() {
        if (!('IntersectionObserver' in window)) {
            /* Fallback: carga todas las imágenes */
            document.querySelectorAll('img[data-src]').forEach(img => {
                img.src = img.dataset.src;
            });
            return;
        }

        const imgObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src || '';
                    imgObserver.unobserve(img);
                }
            });
        }, { rootMargin: '200px' });

        document.querySelectorAll('img[data-src]').forEach(img => imgObserver.observe(img));
    }

    /* ===================================================
       RENDERIZADO COMPLETO
    =================================================== */
    function renderCategories() {
        el.mainContent.innerHTML = '';
        state.vsData = [];
        state.categories = [];
        state.rows = [];

        Object.entries(channelsByCategory).forEach(([catName, channels], catIdx) => {
            const section = buildVirtualRow(catIdx, catName, channels);
            el.mainContent.appendChild(section);
        });

        state.categories = [...document.querySelectorAll('.category-section')];

        /* Lazy load de imágenes después del render */
        requestAnimationFrame(() => {
            setupImageLazyLoad();
            setTimeout(focusChannel, 100);
        });
    }

    /* ===================================================
       RELOJ
    =================================================== */
    function updateTVDateTime() {
        const ahora = new Date();
        const hh  = String(ahora.getHours()).padStart(2, '0');
        const mm  = String(ahora.getMinutes()).padStart(2, '0');
        const dia = ahora.getDate();
        const meses = ['ene.','feb.','mar.','abr.','may.','jun.','jul.','ago.','sep.','oct.','nov.','dic.'];
        const mes = meses[ahora.getMonth()];

        const horaEl  = document.getElementById('hora-actual');
        const fechaEl = document.getElementById('fecha-actual');
        if (horaEl)  horaEl.textContent  = hh + ':' + mm;
        if (fechaEl) fechaEl.textContent = dia + ' ' + mes;
    }

    function startTVClock() {
        updateTVDateTime();
        const ahora       = new Date();
        const msToNextMin = (60 - ahora.getSeconds()) * 1000 - ahora.getMilliseconds();
        setTimeout(function tick() {
            updateTVDateTime();
            setTimeout(tick, 60000);
        }, msToNextMin);
    }

    /* ===================================================
       INICIALIZACIÓN
    =================================================== */
    startTVClock();
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    setupVideoEvents(el.video);

    try { shaka.polyfill.installAll(); } catch(e) {}

    /* Modo estable por defecto (óptimo para streams de Paraguay) */
    setToleranceMode('stable');

    renderCategories();

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            updateTVDateTime();
            // Reinicia el video si el sistema lo pausó sin acción del usuario
            if (state.mode === 'player') {
                const v = el.video;
                if (v && v.paused && state.currentChannelData) {
                    setTimeout(() => {
                        v.play().catch(() => { silentReload(); });
                    }, 500);
                }
            }
        }
    });

    // Mantiene la app activa en Smart TV (previene screensaver/sleep del sistema)
    let _keepAliveInterval = null;
    function startKeepAlive() {
        if (_keepAliveInterval) return;
        _keepAliveInterval = setInterval(() => {
            if (state.mode === 'player' && el.video && !el.video.paused) {
                // Video activo ya previene sleep — solo monitorear
                return;
            }
            // En modo menú, operación DOM mínima para prevenir sleep
            const h = document.getElementById('hora-actual');
            if (h) h.style.opacity = h.style.opacity === '0.99' ? '1' : '0.99';
        }, 25000);
    }
    startKeepAlive();

})();
</script>
</body>
